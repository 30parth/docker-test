services:
  - type: web
    name: laravel-docker-app
    env: docker
    region: frankfurt
    plan: free
    branch: main
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_KEY
        generateValue: true
      - key: APP_DEBUG
        value: "false"
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        value: "yamabiko.proxy.rlwy.net:16466"
      - key: DB_PORT
        value: "3306"
      - key: DB_DATABASE
        value: "laravel"
      - key: DB_USERNAME
        value: "root"
      - key: DB_PASSWORD
        value: "OmlhkGGaiUdwoaGySGMVjbEeEnaeDmnw"
